<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css?v=20260416a" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container" style="max-width:900px;">
          <div style="text-align:center; margin-bottom:1.1rem;">
            <span class="badge">Support</span>
            <h1 class="page-title" style="font-size:clamp(2.3rem,5vw,4.4rem); margin:.8rem 0;">Contact <span class="primary-text">Us</span></h1>
            <p class="lead" style="margin:0 auto; max-width:700px;">Questions about billing, account setup, or workouts? Send us a message and we will get back to you.</p>
          </div>

          <div class="glass-card card" style="padding:1.4rem;">
            <form id="contact-form" class="form-grid">
              <div class="form-row">
                <div>
                  <label class="mini-label" for="name">Your Name</label>
                  <input id="name" required type="text" placeholder="John Doe" />
                </div>
                <div>
                  <label class="mini-label" for="email">Email Address</label>
                  <input id="email" required type="email" placeholder="john@example.com" />
                </div>
              </div>
              <div>
                <label class="mini-label" for="subject">Subject</label>
                <select id="subject" required>
                  <option value="" disabled selected>Select a topic</option>
                  <option value="billing">Billing and Pricing</option>
                  <option value="technical">Technical Support</option>
                  <option value="feedback">General Feedback</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div>
                <label class="mini-label" for="message">Message</label>
                <textarea id="message" required rows="5" placeholder="How can we help you?"></textarea>
              </div>
              <div style="text-align:center;">
                <button class="button button-primary" type="submit">Submit Request</button>
              </div>
            </form>
          </div>

          <div style="text-align:center; margin-top:1rem;">
            <p class="muted">Prefer email?</p>
            <a class="primary-text" href="mailto:support@musclemap.com">support@musclemap.com</a>
          </div>
        </section>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js?v=20260418e" defer></script>
    <script src="../js/site.js?v=20260418e" defer></script>
    <script src="../js/contact.js?v=20260422b" defer></script>
  </body>
</html>
