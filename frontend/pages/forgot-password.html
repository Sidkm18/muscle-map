<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Reset Password - MuscleMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/auth.css" rel="stylesheet">
    <style>
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .step {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            color: #9ca3af;
            font-weight: 700;
        }

        .step.active {
            background: var(--auth-primary);
            color: #111;
        }

        .step.completed {
            background: var(--auth-success);
            color: #111;
        }

        .step-line {
            width: 4rem;
            height: 2px;
            margin: 0 0.5rem;
            background: rgba(255, 255, 255, 0.08);
        }

        .step-line.active {
            background: var(--auth-primary);
        }

        .captcha-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid var(--auth-border);
            border-radius: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.04);
        }

        .captcha-text {
            font-family: "Courier New", monospace;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.35rem;
            color: var(--auth-primary);
            text-decoration: line-through;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        .strength-track {
            display: flex;
            gap: 0.5rem;
        }

        .strength-track div {
            flex: 1;
            height: 0.35rem;
            border-radius: 999px;
            background: #374151;
        }
    </style>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <div class="auth-panel animate-fadeIn">
            <div class="auth-header">
                <div class="auth-badge">PW</div>
                <h1 class="fw-bold mb-2">Reset Your <span class="text-primary">Password</span></h1>
                <p class="auth-help mb-0" id="stepDescription">Enter your email address to get started.</p>
            </div>

            <div class="step-indicator">
                <div class="step active" id="step-1">1</div>
                <div class="step-line" id="line-1"></div>
                <div class="step" id="step-2">2</div>
                <div class="step-line" id="line-2"></div>
                <div class="step" id="step-3">3</div>
                <div class="step-line" id="line-3"></div>
                <div class="step" id="step-4">4</div>
            </div>

            <div class="auth-card auth-step-card">
                <form id="forgotPasswordForm">
                    <div class="form-step active" id="emailStep">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold auth-help" for="resetEmail">Email Address</label>
                            <input class="auth-input" id="resetEmail" placeholder="name@example.com" required type="email">
                            <span class="field-error error-message"></span>
                        </div>
                        <button class="auth-button" onclick="validateEmail()" type="button">Continue</button>
                    </div>

                    <div class="form-step" id="captchaStep">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold auth-help">Verify You're Human</label>
                            <div class="captcha-box mb-3">
                                <div class="captcha-text" id="captchaText">AB12CD</div>
                                <button class="btn btn-secondary" onclick="generateCaptcha()" type="button">Refresh</button>
                            </div>
                            <input class="auth-input" id="captchaInput" placeholder="Enter the code above" required type="text">
                            <span class="field-error error-message"></span>
                        </div>
                        <div class="row g-3">
                            <div class="col-sm-6"><button class="btn btn-secondary w-100" onclick="goToStep(1)" type="button">Back</button></div>
                            <div class="col-sm-6"><button class="auth-button" onclick="validateCaptcha()" type="button">Verify & Continue</button></div>
                        </div>
                    </div>

                    <div class="form-step" id="otpStep">
                        <div class="mb-3 text-center">
                            <label class="form-label small text-uppercase fw-bold auth-help">Enter Verification Code</label>
                            <p class="auth-help">We've sent a 6-digit code to <span class="text-primary fw-semibold" id="emailDisplay"></span></p>
                        </div>
                        <div class="otp-inputs mb-3">
                            <input class="otp-input" id="otp1" maxlength="1" oninput="moveToNext(this, 'otp2')" onkeydown="handleBackspace(event, null, 'otp2')" type="text">
                            <input class="otp-input" id="otp2" maxlength="1" oninput="moveToNext(this, 'otp3')" onkeydown="handleBackspace(event, 'otp1', 'otp3')" type="text">
                            <input class="otp-input" id="otp3" maxlength="1" oninput="moveToNext(this, 'otp4')" onkeydown="handleBackspace(event, 'otp2', 'otp4')" type="text">
                            <input class="otp-input" id="otp4" maxlength="1" oninput="moveToNext(this, 'otp5')" onkeydown="handleBackspace(event, 'otp3', 'otp5')" type="text">
                            <input class="otp-input" id="otp5" maxlength="1" oninput="moveToNext(this, 'otp6')" onkeydown="handleBackspace(event, 'otp4', 'otp6')" type="text">
                            <input class="otp-input" id="otp6" maxlength="1" oninput="moveToNext(this, null)" onkeydown="handleBackspace(event, 'otp5', null)" type="text">
                        </div>
                        <span class="field-error error-message text-center"></span>
                        <div class="text-center my-3">
                            <button class="btn btn-link mm-auth-link p-0" onclick="resendOTP()" type="button">Resend code</button>
                        </div>
                        <div class="row g-3">
                            <div class="col-sm-6"><button class="btn btn-secondary w-100" onclick="goToStep(2)" type="button">Back</button></div>
                            <div class="col-sm-6"><button class="auth-button" onclick="validateOTP()" type="button">Verify Code</button></div>
                        </div>
                    </div>

                    <div class="form-step" id="passwordStep">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold auth-help" for="newPassword">New Password</label>
                            <div class="auth-input-group">
                                <input class="auth-input pe-5" id="newPassword" placeholder="Enter new password" required type="password">
                                <button class="auth-input-action" onclick="togglePasswordVisibility('newPassword', this)" type="button">Show</button>
                            </div>
                            <span class="field-error error-message"></span>
                            <div class="strength-track mt-3">
                                <div id="strength1"></div>
                                <div id="strength2"></div>
                                <div id="strength3"></div>
                                <div id="strength4"></div>
                            </div>
                            <p class="auth-help mt-2 mb-0" id="strengthText">Password strength: Weak</p>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-uppercase fw-bold auth-help" for="confirmPassword">Confirm Password</label>
                            <div class="auth-input-group">
                                <input class="auth-input pe-5" id="confirmPassword" placeholder="Re-enter new password" required type="password">
                                <button class="auth-input-action" onclick="togglePasswordVisibility('confirmPassword', this)" type="button">Show</button>
                            </div>
                            <span class="field-error error-message"></span>
                        </div>

                        <button class="auth-button" onclick="resetPassword(event)" type="button">Reset Password</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-4 border-top border-secondary-subtle">
                    <a class="mm-auth-link" href="login.html">Back to Login</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
