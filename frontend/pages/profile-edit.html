<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css?v=20260416d" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container" style="max-width: 1020px;">
          <div class="grid-2 glass-card" style="overflow: hidden; align-items: stretch;">
            <div style="min-height: 520px; background: linear-gradient(180deg, rgba(197,255,47,0.08), rgba(10,11,7,0.2)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=1600') center/cover no-repeat;"></div>

            <div class="card" style="padding: 2rem;">
              <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem;">
                <div>
                  <h1 class="page-title" style="font-size:2rem; margin:.2rem 0;">Edit Account Profile</h1>
                  <p class="muted" style="max-width:32rem;">Update your identity, demographics, public bio, and profile photo. Your changes will sync back to your profile once saved.</p>
                </div>
                <a class="button button-outline" href="./profile.html">Back</a>
              </div>

              <div class="profile-edit-avatar-row">
                <button id="profile-avatar-trigger" class="profile-avatar-button" type="button" aria-label="Change profile photo">
                  <img id="profile-avatar" class="profile-avatar" alt="User avatar" />
                  <span class="profile-edit-avatar-overlay">Click To Change Photo</span>
                </button>
                <div class="profile-edit-avatar-copy">
                  <span class="mini-label">Profile Photo</span>
                  <p class="muted" style="margin:0;">Click the avatar to upload a new image. Changes are saved with the rest of your profile.</p>
                  <button id="profile-photo-delete" class="button button-outline" type="button">Delete Photo</button>
                </div>
              </div>

              <input id="profile-photo-input" type="file" accept="image/*" hidden />

              <form id="profile-form" class="profile-field-grid" style="margin-top:1.15rem;">
                <div class="form-row">
                  <div>
                    <label class="mini-label" for="profile-full-name">Full Name</label>
                    <input id="profile-full-name" name="full_name" type="text" placeholder="John Doe" />
                  </div>
                  <div>
                    <label class="mini-label" for="profile-username">Username</label>
                    <input id="profile-username" name="username" type="text" placeholder="musclemap_user" />
                  </div>
                </div>

                <div class="form-row">
                  <div>
                    <label class="mini-label" for="profile-email">Email Address</label>
                    <input id="profile-email" type="email" readonly />
                  </div>
                  <div>
                    <label class="mini-label" for="profile-phone">Phone</label>
                    <input id="profile-phone" name="phone" type="tel" placeholder="+91 98765 43210" />
                  </div>
                </div>

                <div class="form-row">
                  <div>
                    <label class="mini-label" for="profile-gender">Gender</label>
                    <select id="profile-gender" name="gender">
                      <option value="Prefer Not to Say">Prefer Not to Say</option>
                      <option value="Male">Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>
                  <div>
                    <label class="mini-label" for="profile-dob">Date of Birth</label>
                    <input id="profile-dob" name="dob" type="date" />
                  </div>
                </div>

                <div>
                  <label class="mini-label" for="profile-bio">Bio</label>
                  <textarea id="profile-bio" name="bio" rows="4" maxlength="180" placeholder="What are you training for right now?"></textarea>
                </div>

                <button id="profile-save" class="button button-primary" type="submit">Save Profile</button>
              </form>
            </div>
          </div>
        </section>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js?v=20260418e" defer></script>
    <script src="../js/site.js?v=20260418e" defer></script>
    <script src="../js/profile-edit.js?v=20260416a" defer></script>
  </body>
</html>
