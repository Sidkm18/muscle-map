<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercises | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container">
          <span class="badge">Exercise Library</span>
          <h1 class="page-title" style="font-size:clamp(2.3rem,5vw,4.4rem); margin:.8rem 0;">Exercise <span class="primary-text">Library</span></h1>
          <p class="lead">Browse reliable movements by muscle group, then filter fast to build your workout block.</p>

          <div class="glass-card card" style="margin:1.2rem 0;">
            <p class="mini-label" style="margin:0 0 .8rem;">Filter by muscle group</p>
            <div class="filter-row" id="filter-row">
              <button class="pill active" type="button" data-filter="all">All Exercises</button>
              <button class="pill" type="button" data-filter="chest">Chest</button>
              <button class="pill" type="button" data-filter="back">Back</button>
              <button class="pill" type="button" data-filter="legs">Legs</button>
              <button class="pill" type="button" data-filter="shoulders">Shoulders</button>
              <button class="pill" type="button" data-filter="arms">Arms</button>
            </div>
          </div>

          <p class="muted" id="exercise-count"></p>
          <div class="exercise-grid" id="exercise-grid"></div>
        </section>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js" defer></script>
    <script src="../js/site.js" defer></script>
    <script src="../js/exercises.js" defer></script>
  </body>
</html>
