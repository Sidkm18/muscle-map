<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercises | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css?v=20260416a" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container">
          <span class="badge">Exercise Library</span>
          <h1 class="page-title" style="font-size:clamp(2.3rem,5vw,4.4rem); margin:.8rem 0;">Exercise <span class="primary-text">Library</span></h1>
          <p class="lead">Browse reliable movements by muscle group, then filter fast to build your workout block.</p>

          <div class="glass-card card" style="margin:1.2rem 0;">
            <p class="mini-label" style="margin:0 0 .8rem;">Filter by muscle group</p>
            <div class="filter-row" id="filter-row">
              <button class="pill active" type="button" data-filter="all" aria-pressed="true">All Exercises</button>
              <button class="pill" type="button" data-filter="chest" aria-pressed="false">Chest</button>
              <button class="pill" type="button" data-filter="back" aria-pressed="false">Back</button>
              <button class="pill" type="button" data-filter="legs" aria-pressed="false">Legs</button>
              <button class="pill" type="button" data-filter="shoulders" aria-pressed="false">Shoulders</button>
              <button class="pill" type="button" data-filter="arms" aria-pressed="false">Arms</button>
            </div>
            <div id="sub-muscle-filter-section" hidden style="margin-top:1rem;">
              <p class="mini-label" style="margin:0 0 .8rem;">Filter by muscle region</p>
              <div class="filter-row" id="sub-muscle-filter-row"></div>
            </div>
            <div id="equipment-filter-section" hidden style="margin-top:1rem;">
              <p class="mini-label" style="margin:0 0 .8rem;">Filter by equipment</p>
              <div class="filter-row" id="equipment-filter-row"></div>
            </div>
          </div>

          <div class="glass-card card workout-session-shell">
            <div class="workout-session-head">
              <div class="workout-session-copy">
                <p class="mini-label" style="margin:0 0 .35rem;">Workout Builder</p>
                <button id="start-workout-button" class="button button-primary" type="button">Start Workout</button>
              </div>
            </div>
            <div class="workout-session-status">
              <span id="workout-session-count" class="muted"></span>
            </div>
          </div>

          <p class="muted" id="exercise-count"></p>
          <div class="exercise-grid" id="exercise-grid"></div>
        </section>

        <aside id="workout-floating-panel" class="glass-card card workout-floating-panel" aria-live="polite" hidden>
          <div id="workout-floating-timer-block" class="workout-floating-controls" hidden>
            <div class="workout-floating-controls-row">
              <div class="workout-floating-timer-display-wrap">
                <span class="mini-label">Workout Duration</span>
                <strong id="workout-floating-timer-display" class="workout-floating-timer-display">00:00:00</strong>
              </div>
              <div class="workout-floating-timer-actions">
                <button id="workout-timer-start" class="button button-primary" type="button">Start</button>
                <button id="workout-timer-stop" class="button button-outline" type="button">Stop</button>
                <button id="workout-timer-lap" class="button button-outline" type="button">Lap</button>
                <button id="workout-timer-reset" class="button button-outline" type="button">Reset</button>
              </div>
            </div>
            <div class="workout-floating-controls-row workout-floating-controls-row-secondary">
              <div class="workout-floating-progress">
                <div class="workout-floating-progress-meta">
                  <span id="workout-floating-progress-label" class="muted">No exercises configured yet.</span>
                  <strong id="workout-floating-progress-value">0%</strong>
                </div>
                <div class="wizard-progress">
                  <div id="workout-floating-progress-bar" class="wizard-progress-fill"></div>
                </div>
              </div>
            </div>
          </div>
          <div id="workout-floating-laps" class="workout-floating-laps" hidden></div>
          <div id="workout-floating-list" class="workout-floating-list"></div>
        </aside>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js?v=20260418e" defer></script>
    <script src="../js/site.js?v=20260418e" defer></script>
    <script src="../js/exercises.js?v=20260416b" defer></script>
  </body>
</html>
