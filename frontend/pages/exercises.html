<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Exercise Library - MuscleMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/main.css" rel="stylesheet">
</head>
<body>
    <div class="mm-navbar-wrap">
        <nav class="navbar navbar-expand-lg mm-navbar">
            <div class="container-fluid px-0">
                <a class="navbar-brand mm-brand text-white" href="../index.html">MuscleMap</a>
                <button class="navbar-toggler border-0 text-white" data-bs-target="#pageNav" data-bs-toggle="collapse" type="button">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="pageNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="./exercises.html">Exercises</a></li>
                        <li class="nav-item"><a class="nav-link" href="./calculator.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="./pricing.html">Pricing</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <main class="container mm-page">
        <div class="row gy-4 mb-4">
            <div class="col-lg-8">
                <span class="mm-badge mb-3">Exercise Library</span>
                <h1 class="mm-title-lg mb-3">Exercise <span class="mm-highlight">Library</span></h1>
                <p class="mm-copy fs-5 mb-0">Browse exercises by muscle group and use the filter buttons to narrow the list.</p>
            </div>
        </div>

        <section class="mm-card p-4 mb-4">
            <label class="form-label text-uppercase small fw-bold mm-muted">Filter by muscle group</label>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn mm-filter-btn active filter-btn" data-category="all" type="button">All Exercises</button>
                <button class="btn mm-filter-btn filter-btn" data-category="chest" type="button">Chest</button>
                <button class="btn mm-filter-btn filter-btn" data-category="back" type="button">Back</button>
                <button class="btn mm-filter-btn filter-btn" data-category="legs" type="button">Legs</button>
                <button class="btn mm-filter-btn filter-btn" data-category="shoulders" type="button">Shoulders</button>
                <button class="btn mm-filter-btn filter-btn" data-category="arms" type="button">Arms</button>
            </div>
        </section>

        <p class="mm-copy mb-4" id="exercise-count">Loading exercises...</p>

        <div class="row g-4" id="exercises-container"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/exercises.js"></script>
</body>
</html>
