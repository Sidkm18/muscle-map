<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container" style="max-width:1020px;">
          <div class="grid-2 glass-card" style="overflow:hidden; align-items:stretch;">
            <div style="min-height:450px; background:url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&q=80&w=1600') center/cover no-repeat;"></div>
            <div class="card" style="padding:2rem;">
              <h1 class="page-title" style="font-size:2rem; margin:.2rem 0;">Create Account</h1>
              <p class="muted">Set up your account and start building a consistent training log.</p>

              <form id="register-form" class="form-grid" style="margin-top:1rem;">
                <div>
                  <label class="mini-label" for="reg-name">Full Name</label>
                  <input id="reg-name" type="text" placeholder="John Doe" required />
                </div>
                <div>
                  <label class="mini-label" for="reg-email">Email Address</label>
                  <input id="reg-email" type="email" placeholder="name@example.com" required />
                </div>
                <div>
                  <label class="mini-label" for="reg-password">Password</label>
                  <div style="display:flex; gap:.5rem;">
                    <input id="reg-password" type="password" placeholder="Create a password" required />
                    <button id="toggle-register-password" class="pill" type="button">Show</button>
                  </div>
                  <div id="strength-meter" style="display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:.4rem; margin-top:.6rem;">
                    <div class="strength-bar" style="height:8px; border-radius:999px; background:rgba(255,255,255,.1);"></div>
                    <div class="strength-bar" style="height:8px; border-radius:999px; background:rgba(255,255,255,.1);"></div>
                    <div class="strength-bar" style="height:8px; border-radius:999px; background:rgba(255,255,255,.1);"></div>
                    <div class="strength-bar" style="height:8px; border-radius:999px; background:rgba(255,255,255,.1);"></div>
                  </div>
                </div>

                <button class="button button-primary" type="submit">Create Account</button>
              </form>

              <p class="muted">Already registered? <a class="primary-text" href="./login.html">Sign in</a></p>
            </div>
          </div>
        </section>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js" defer></script>
    <script src="../js/site.js" defer></script>
    <script src="../js/register.js" defer></script>
  </body>
</html>
