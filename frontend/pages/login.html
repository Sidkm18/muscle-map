<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | MuscleMap</title>
    <link rel="stylesheet" href="../css/styles.css?v=20260416a" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-grid"></div>
      <header id="site-nav"></header>

      <main>
        <section class="container" style="max-width:1020px;">
          <div class="grid-2 glass-card" style="overflow:hidden;">
            <div style="min-height:420px; background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=1200') center/cover no-repeat;"></div>

            <div class="card" style="padding:2rem;">
              <h1 class="page-title" style="font-size:2rem; margin:.2rem 0;">Welcome Back</h1>
              <p class="muted">Sign in to continue tracking your training.</p>

              <div style="border:1px solid rgba(197,255,47,.2); background:rgba(197,255,47,.08); border-radius:10px; padding:.75rem; margin:1rem 0;">
                <p style="margin:.1rem 0; font-weight:700;">Demo Credentials</p>
                <p class="muted" style="margin:.2rem 0;">Email: <span class="primary-text">demo@musclemap.com</span></p>
                <p class="muted" style="margin:.2rem 0;">Password: <span class="primary-text">Demo@123</span></p>
              </div>

              <form id="login-form" class="form-grid">
                <div>
                  <label class="mini-label" for="login-email">Email Address</label>
                  <input id="login-email" type="email" placeholder="name@example.com" required />
                </div>
                <div>
                  <label class="mini-label" for="login-password">Password</label>
                  <div style="display:flex; gap:.5rem;">
                    <input id="login-password" type="password" placeholder="Enter your password" required />
                    <button class="pill" id="toggle-password" type="button" aria-label="Show password" aria-pressed="false">Show</button>
                  </div>
                </div>
                <label style="display:flex; align-items:center; gap:.6rem; color:var(--muted); font-size:.95rem;">
                  <input id="login-remember-me" type="checkbox" style="accent-color:var(--primary);" />
                  <span>Remember me on this device</span>
                </label>
                <button class="button button-primary" type="submit">Sign In</button>
              </form>

              <p class="muted">New here? <a class="primary-text" href="./register.html">Create an account</a></p>
            </div>
          </div>
        </section>
      </main>

      <div id="site-footer"></div>
    </div>

    <script src="../js/site-runtime.js?v=20260418e" defer></script>
    <script src="../js/site.js?v=20260418e" defer></script>
    <script src="../js/login.js" defer></script>
  </body>
</html>
