<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MuscleMap Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/auth.css" rel="stylesheet">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <div class="auth-panel animate-fadeIn">
            <div class="auth-header">
                <div class="auth-badge">MM</div>
                <h1 class="fw-bold mb-2">Welcome Back to <span class="text-primary">MuscleMap</span></h1>
                <p class="auth-help mb-0">Sign in to continue your fitness journey.</p>
            </div>

            <div class="status-box info mb-4">
                <strong class="d-block mb-1">Demo Credentials</strong>
                <span class="d-block">Email: <span class="text-primary">demo@musclemap.com</span></span>
                <span class="d-block">Password: <span class="text-primary">Demo@123</span></span>
            </div>

            <div class="auth-card">
                <div class="auth-card-header">
                    <h2 class="h5 mb-1">Sign In</h2>
                    <p class="auth-help mb-0">Use the demo account or your own stored credentials.</p>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold auth-help" for="login-email">Email Address</label>
                        <input class="auth-input" id="login-email" placeholder="name@example.com" type="email">
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label small text-uppercase fw-bold auth-help mb-0" for="login-password">Password</label>
                            <a class="mm-auth-link small" href="forgot-password.html">Forgot Password?</a>
                        </div>
                        <div class="auth-input-group">
                            <input class="auth-input pe-5" id="login-password" placeholder="Enter your password" type="password">
                            <button class="auth-input-action" onclick="toggleLoginPasswordVisibility(this)" type="button">Show</button>
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" id="remember-me" type="checkbox">
                        <label class="form-check-label auth-help" for="remember-me">Remember me</label>
                    </div>

                    <button class="auth-button" type="submit">Sign In</button>
                </form>

                <div class="text-center mt-4">
                    <p class="auth-help mb-0">
                        Don't have an account?
                        <a class="mm-auth-link fw-semibold" href="./register.html">Sign up here</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
